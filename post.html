<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>文章 | 我的博客</title>
  <link rel="stylesheet" href="css/style.css" data-nocache>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script>
    (function() {
      var t = Date.now();
      document.querySelectorAll('[data-nocache]').forEach(function(el) {
        var attr = el.href !== undefined ? 'href' : 'src';
        var url = el[attr];
        if (url && !url.includes('_t=')) {
          el[attr] = url + (url.includes('?') ? '&' : '?') + '_t=' + t;
        }
      });
    })();
  </script>
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(reg) {
          reg.unregister();
        });
      });
    }
  </script>
  <div class="container">
    <header>
      <a href="index.html" class="site-title">我的博客</a>
      <nav>
        <a href="index.html">首页</a>
      </nav>
    </header>

    <main>
      <article id="post-content"></article>
    </main>

    <footer>
      <p>&copy; 2026 我的博客</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/main.js" data-nocache></script>
  <script>
    initPost();
  </script>
</body>
</html>
